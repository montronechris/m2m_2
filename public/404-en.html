<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Dish not found | Restaurant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #FFFCF7;
    --fg: #2D2A26;
    --muted: #8A8278;
    --orange: #FF6B00;
    --orange-soft: #FFF0E4;
    --green: #4CAF50;
    --green-soft: #E8F5E9;
    --border: #F0EAE0;
  }

  *{margin:0;padding:0;box-sizing:border-box}
  html, body{height:100%}
  body{
    font-family:'Lato', sans-serif;
    background:var(--bg);
    color:var(--fg);
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
    transition: opacity 0.6s ease, transform 0.6s ease, filter 0.6s ease;
  }

  /* Classe per l'animazione di uscita */
  body.is-exiting {
    opacity: 0;
    transform: scale(0.95);
    filter: blur(8px);
  }

  /* Sfondo con sfumature */
  .blob {
    position:fixed;
    border-radius:50%;
    filter:blur(80px);
    z-index:0;
    pointer-events:none;
    opacity: 0;
    animation: fadeInBlob 1s ease 0.2s forwards;
  }
  .blob-1 { width:500px; height:500px; background:var(--orange-soft); top:-150px; left:-100px; }
  .blob-2 { width:400px; height:400px; background:var(--green-soft); bottom:-100px; right:-50px; animation-delay: 0.4s; }

  @keyframes fadeInBlob { to { opacity: 1; } }

  /* Particelle fluttuanti */
  .particle {
    position: absolute;
    background: var(--orange);
    border-radius: 50%;
    opacity: 0.3;
    pointer-events: none;
    animation: floatUp linear infinite;
  }
  @keyframes floatUp {
    from { transform: translateY(100vh) scale(0); opacity: 0; }
    20% { opacity: 0.4; }
    to { transform: translateY(-10vh) scale(1); opacity: 0; }
  }

  /* Card Centrale */
  .card-wrapper {
    perspective: 1000px;
    z-index: 10;
    width: 90%;
    max-width: 560px;
  }
  .card {
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 40px;
    padding: 60px 50px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.05);
    transform-style: preserve-3d;
    transition: transform 0.2s ease-out;
    opacity: 0;
    transform: translateY(40px) scale(0.95);
    animation: cardIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
  }
  @keyframes cardIn { to { opacity: 1; transform: translateY(0) scale(1); } }

  /* Illustrazione Piatto */
  .plate-container {
    position:relative;
    width:140px; height:140px;
    margin: 0 auto 30px;
    opacity: 0;
    transform: scale(0.5) rotate(-45deg);
    animation: plateIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.6s forwards;
  }
  @keyframes plateIn { to { opacity: 1; transform: scale(1) rotate(0deg); } }

  .plate {
    width:100%; height:100%;
    background: white;
    border: 4px solid var(--orange);
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow: 0 10px 30px rgba(255, 107, 0, 0.15);
  }
  .plate-text {
    font-family:'Playfair Display', serif;
    font-size: 48px;
    font-weight: 900;
    color: var(--orange);
    letter-spacing: -2px;
  }

  .steam {
    position:absolute;
    bottom: 50%;
    width: 8px;
    height: 30px;
    background: rgba(255,255,255, 0.6);
    border-radius: 20px;
    filter: blur(5px);
    opacity: 0;
  }
  .steam-1 { animation: steam 3s infinite linear 1.5s; left: 45%; }
  .steam-2 { animation: steam 3s infinite linear 1.8s; left: 55%; }
  .steam-3 { animation: steam 3s infinite linear 2.1s; left: 50%; }

  @keyframes steam {
    0% { opacity: 0; transform: translate(-50%, 0) scale(1); }
    50% { opacity: 0.8; }
    100% { opacity: 0; transform: translate(-50%, -40px) scale(1.5); }
  }

  /* Tipografia */
  .label, h1, p, .actions, .divider, .chef-signature {
    opacity: 0;
    transform: translateY(20px);
    animation: textIn 0.6s ease forwards;
  }
  .label { animation-delay: 0.9s; }
  h1 { animation-delay: 1.0s; }
  p { animation-delay: 1.1s; }
  .actions { animation-delay: 1.2s; }
  .divider { animation-delay: 1.3s; }
  .chef-signature { animation-delay: 1.4s; }

  @keyframes textIn { to { opacity: 1; transform: translateY(0); } }

  .label {
    display:inline-block;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--green);
    background: var(--green-soft);
    padding: 8px 16px;
    border-radius: 50px;
    margin-bottom: 24px;
  }
  h1 {
    font-family:'Playfair Display', serif;
    font-size: 36px;
    font-weight: 700;
    color: var(--fg);
    margin-bottom: 16px;
    line-height: 1.2;
  }
  p {
    font-size: 16px;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 32px;
  }

  /* Pulsanti */
  .actions { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }
  .btn {
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap: 10px;
    padding: 16px 32px;
    border-radius: 50px;
    font-weight: 700;
    font-size: 15px;
    text-decoration:none;
    transition: all 0.3s ease;
    cursor:pointer;
    border: none;
  }
  .btn-primary {
    background: var(--orange);
    color: white;
    box-shadow: 0 8px 20px rgba(255, 107, 0, 0.3);
  }
  .btn-primary:hover {
    background: #e65e00;
    transform: translateY(-3px);
    box-shadow: 0 12px 25px rgba(255, 107, 0, 0.4);
  }
  .btn-secondary {
    background: white;
    color: var(--fg);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover {
    background: #fff;
    border-color: var(--fg);
    transform: translateY(-3px);
  }

  /* Divider e Footer */
  .divider {
    width: 40px; height: 2px;
    background: var(--orange);
    margin: 30px auto 20px;
    border-radius: 10px;
  }
  .chef-signature {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 14px;
    color: var(--muted);
  }

  @media (max-width: 600px) {
    .card { padding: 40px 25px; border-radius: 30px; }
    h1 { font-size: 28px; }
    .plate-container { width: 110px; height: 110px; }
    .plate-text { font-size: 38px; }
  }
</style>
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="card-wrapper">
    <div class="card" id="tiltCard">
      <div class="plate-container">
        <div class="steam steam-1"></div>
        <div class="steam steam-2"></div>
        <div class="steam steam-3"></div>
        <div class="plate">
          <span class="plate-text">404</span>
        </div>
      </div>

      <div class="label">In The Kitchen</div>
      <h1>This dish isn't on the menu</h1>
      <p>
        It looks like the page you ordered isn't available. Maybe the link went stale or our chef changed the menu. Head back to the main table to discover our specialties.
      </p>

      <div class="actions">
        <a href="/" class="btn btn-primary nav-link">
          Back to Main Menu
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
        </a>
        <a href="javascript:history.back()" class="btn btn-secondary nav-link">
          Back
        </a>
      </div>

      <div class="divider"></div>
      <div class="chef-signature">— The Chef recommends not getting lost</div>
    </div>
  </div>

  <script>
    // 1. Effetto 3D Tilt sulla Card
    const card = document.getElementById('tiltCard');
    const wrapper = document.querySelector('.card-wrapper');

    wrapper.addEventListener('mousemove', (e) => {
      const rect = wrapper.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      const centerX = rect.width / 2;
      const centerY = rect.height / 2;
      const rotateX = (y - centerY) / 15;
      const rotateY = (centerX - x) / 15;
      card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
    });

    wrapper.addEventListener('mouseleave', () => {
      card.style.transform = 'rotateX(0) rotateY(0)';
    });

    // 2. Animazione di uscita (Page Transition)
    document.querySelectorAll('.nav-link').forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault(); // Blocca il redirect immediato
        const href = link.getAttribute('href');

        // Aggiunge la classe per sfumare e sfocare
        document.body.classList.add('is-exiting');

        // Aspetta che l'animazione finisca prima di cambiare pagina
        setTimeout(() => {
          if (href === 'javascript:history.back()') {
            history.back();
          } else {
            window.location.href = href;
          }
        }, 600); // 600ms = durata dell'animazione CSS
      });
    });

    // 3. Generatore di particelle fluttuanti
    function createParticles() {
      for(let i = 0; i < 15; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 6 + 2;
        p.style.width = size + 'px';
        p.style.height = size + 'px';
        p.style.left = Math.random() * 100 + 'vw';
        p.style.background = Math.random() > 0.5 ? 'var(--orange)' : 'var(--green)';
        p.style.animationDuration = (Math.random() * 10 + 10) + 's';
        p.style.animationDelay = Math.random() * 5 + 's';
        document.body.appendChild(p);
      }
    }
    createParticles();
  </script>
</body>
</html>
